name: valley_control
description: Valley irrigation control system
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mqtt_client: ^10.0.0
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
      - assets/images/field_1.png
      - assets/images/field_2.png
      - assets/images/field_3.png
      - assets/images/field_4.png
      - assets/images/field_5.png
      - assets/images/field_default.png